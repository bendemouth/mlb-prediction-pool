version: '3.8'

# Dev deployment: same combined container as prod but runs on port 8081
# so both environments can coexist on the same EC2 instance.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        REACT_APP_API_URL: /api
        REACT_APP_COGNITO_USER_POOL_ID: ${REACT_APP_COGNITO_USER_POOL_ID}
        REACT_APP_COGNITO_APP_CLIENT_ID: ${REACT_APP_COGNITO_APP_CLIENT_ID}
    container_name: mlb-pool-dev
    ports:
      - "8081:80"
    env_file:
      - .env.dev-deploy
    restart: always
