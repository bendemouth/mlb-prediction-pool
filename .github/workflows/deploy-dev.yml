name: Deploy — Dev 

on:
  push:
    branches:
      - dev

env:
  APP_DIR: /opt/app-dev

jobs:
  deploy:
    name: Build & deploy to EC2 (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare app directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST}}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p ${{ env.APP_DIR }}
            sudo chown ec2-user:ec2-user ${{ env.APP_DIR }}
      
      - name: Update source code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST}}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "${{ env.APP_DIR }}/.git" ]; then
              git clone https://github.com/${{ github.repository }} ${{ env.APP_DIR }}
            else
              git -C ${{ env.APP_DIR }} fetch origin
              git -C ${{ env.APP_DIR }} checkout dev
              git -C ${{ env.APP_DIR }} pull origin dev
            fi

      - name: Write env file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            printf '%s' '${{ secrets.DEV_ENV }}' > ${{ env.APP_DIR }}/.env.dev-deploy

      - name: Update Docker Buildx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/.docker/cli-plugins
            curl -SL https://github.com/docker/buildx/releases/download/v0.23.0/buildx-v0.23.0.linux-amd64 \
              -o ~/.docker/cli-plugins/docker-buildx
            chmod +x ~/.docker/cli-plugins/docker-buildx

      - name: Build Docker image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd ${{ env.APP_DIR }}
            export REACT_APP_COGNITO_USER_POOL_ID="${{ secrets.DEV_COGNITO_USER_POOL_ID }}"
            export REACT_APP_COGNITO_APP_CLIENT_ID="${{ secrets.DEV_COGNITO_APP_CLIENT_ID }}"
            docker compose -f docker-compose.dev-deploy.yml build --no-cache

      - name: Start container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}
            docker compose -f docker-compose.dev-deploy.yml up -d

      - name: Prune old images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker image prune -f
